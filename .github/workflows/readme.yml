name: Readme Workflow

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Clone genie
        run: |
          git clone https://${{ secrets.GITHUB }}@github.com/terraform-az-modules/genie.git /home/runner/genie
    
      - name: Debug genie
        run: |
          ls -la /home/runner/genie
          ls -la /home/runner/genie/views/docs || true

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Generate README
        run: |
          make readme GENIE_PATH=/home/runner/genie

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.GITHUB }}
        run: |
          git config --global user.name "clouddrove-ci"
          git config --global user.email "cloudrove-ci@clouddrove.com"

          git add README.md docs/io.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update README"

            git push origin HEAD:${{ github.ref_name }}
          fi












