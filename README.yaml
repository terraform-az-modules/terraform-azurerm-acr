name: Terraform Azure Container Registry

intro: |-
  With our comprehensive DevOps toolkit - streamline operations, automate workflows, enhance collaboration and deploy with confidence.

badges_text: "Latest Release | tfsec | License | Changelog"

about: |-
  Terraform module to create and manage Azure Container Registry on Azure.

license: "APACHE"

github_repo: terraform-az-modules/terraform-azurerm-acr

badges:
  - name: "Terraform"
    image: "https://img.shields.io/badge/Terraform-v1.10.0-green"
    url: "https://www.terraform.io"

  - name: "Licence"
    image: "https://img.shields.io/badge/License-APACHE-blue.svg"
    url: "LICENSE.md"

prerequisites:
  - name: Terraform
    url: https://learn.hashicorp.com/terraform/getting-started/install.html
    version: ">= 1.10.0"

providers:
  - name: azurerm
    url: https://registry.terraform.io/providers/hashicorp/azurerm/latest
    version: ">= 4.0"

description: |-
  Terraform module to create and manage Azure Container Registry on Azure.

usage: |-
  ### Example

  ```hcl
  module "container-registry" {
    source              = "../../"
    name                = "core"
    environment         = "dev"
    label_order         = ["name", "environment", "location"]
    resource_group_name = "test"
    location            = "centralindia"
    encryption          = false
    enable_diagnostic   = false
    ##-----------------------------------------------------------------------------
    ## To be mentioned for private endpoint, because private endpoint is enabled by default.
    ## To disable private endpoint set 'enable_private_endpoint' variable = false and than no need to specify following variable
    ##-----------------------------------------------------------------------------
    subnet_id = ""
  }
  ```
